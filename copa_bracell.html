<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Álbum Copa Bracell Absoluto</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;1,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --purple:#5B1A8A;--purple-dark:#3A0D5C;--purple-mid:#7B2AB5;
  --gold:#F5C518;--gold-dark:#D4A00E;
  --white:#fff;--muted:rgba(255,255,255,0.5);
  --page-bg:#F0EDE6;--page-line:#DDD8CE;
  --card-shadow:0 3px 12px rgba(0,0,0,0.15);
}
html{scroll-behavior:smooth}
body{background:#1a0a2e;font-family:'Barlow',sans-serif;color:var(--white);min-height:100vh;overflow-x:hidden}

/* LOGOS */
.logo-b{height:24px;width:auto;object-fit:contain}
.logo-s{height:20px;width:auto;object-fit:contain}
.logos{display:flex;align-items:center;gap:10px}

/* COVER */
#cover{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:40px 24px;position:relative;overflow:hidden;
  background:linear-gradient(160deg,#3A0D5C 0%,#5B1A8A 40%,#7B2AB5 70%,#3A0D5C 100%)}
.cvbg{position:absolute;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(ellipse 120% 80% at 50% -10%,rgba(245,197,24,0.15) 0%,transparent 60%),
  repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,255,255,0.03) 40px),
  repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(255,255,255,0.03) 40px)}
.hex{position:absolute;background:rgba(255,255,255,0.03);pointer-events:none;
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);animation:floatHex 8s ease-in-out infinite}
.hex:nth-child(1){top:5%;left:5%;width:60px;height:69px}
.hex:nth-child(2){top:15%;right:8%;width:100px;height:115px;animation-delay:1s}
.hex:nth-child(3){top:40%;left:-2%;width:70px;height:81px;animation-delay:2s}
.hex:nth-child(4){top:60%;right:3%;width:55px;height:63px;animation-delay:3s}
.hex:nth-child(5){bottom:10%;left:12%;width:90px;height:104px;animation-delay:4s}
.hex:nth-child(6){bottom:20%;right:15%;width:65px;height:75px;animation-delay:1.5s}
@keyframes floatHex{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-15px) rotate(5deg)}}
.cv-inner{position:relative;z-index:10;max-width:700px;display:flex;flex-direction:column;align-items:center}

/* Book */
.cv-book{position:relative;margin-bottom:32px;filter:drop-shadow(0 20px 60px rgba(0,0,0,0.6))}
.bk-spine{position:absolute;left:-18px;top:4px;bottom:4px;width:18px;
  background:linear-gradient(180deg,#2a0845,#4a1070,#2a0845);border-radius:3px 0 0 3px;box-shadow:-4px 0 12px rgba(0,0,0,0.4)}
.bk-cover{width:280px;border-radius:0 8px 8px 0;
  background:#1e52a8;
  border:2px solid rgba(255,255,255,0.15);
  padding:24px 20px;position:relative;overflow:hidden;
  box-shadow:6px 6px 30px rgba(0,0,0,0.5);
  display:flex;flex-direction:column;min-height:420px}
.bk-geo{position:absolute;inset:0;width:100%;height:100%;border-radius:0 8px 8px 0;pointer-events:none}
.bk-top-strip{position:relative;z-index:3;background:rgba(10,30,80,0.75);
  text-align:center;padding:8px 0;font-family:'Barlow Condensed',sans-serif;
  font-size:12px;font-weight:700;letter-spacing:4px;color:white;text-transform:uppercase;
  border-bottom:1px solid rgba(255,255,255,0.15);margin:-24px -20px 0;padding-left:20px;padding-right:20px}
.bk-logo-b{position:relative;z-index:3;width:180px;margin:16px auto 4px;drop-shadow:0 4px 20px rgba(0,0,0,0.4)}
.bk-logo-b svg{width:100%;height:auto;filter:drop-shadow(0 4px 16px rgba(0,0,0,0.5))}
.bk-copa-title{position:relative;z-index:3;font-family:'Bebas Neue',cursive;font-size:24px;
  letter-spacing:4px;color:white;text-align:center;margin-bottom:10px;
  text-shadow:0 2px 8px rgba(0,0,0,0.5)}
.bk-abs-wrap{position:relative;z-index:3;display:flex;justify-content:center;margin-bottom:16px}
.bk-abs-inner{background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.3);
  border-radius:30px;padding:4px 20px}
.bk-abs-inner svg{display:block}
.bk-footer{position:relative;z-index:3;display:flex;align-items:center;
  justify-content:space-between;padding-top:10px;
  border-top:1px solid rgba(255,255,255,0.2);margin-top:auto}
.bk-logo-img{height:20px;width:auto;object-fit:contain}
.bk-logo-spot{height:18px}

.cv-title{font-family:'Bebas Neue',cursive;font-size:clamp(52px,12vw,110px);
  line-height:.85;letter-spacing:4px;text-shadow:0 4px 30px rgba(0,0,0,0.4);margin-bottom:8px}
.cv-title em{display:block;color:var(--gold);font-style:normal;text-shadow:0 4px 20px rgba(245,197,24,0.4)}
.cv-sub{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;
  letter-spacing:6px;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:28px}
.cv-prog{width:100%;max-width:460px;background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:18px 24px;margin-bottom:28px}
.cp-lbl{display:flex;justify-content:space-between;font-size:11px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.cp-gold{color:var(--gold);font-size:14px}
.cp-bar{height:10px;background:rgba(255,255,255,0.1);border-radius:5px;overflow:hidden}
.cp-fill{height:100%;background:linear-gradient(90deg,var(--gold-dark),var(--gold),#FFE55C);
  border-radius:5px;transition:width .7s ease}
.cv-teams{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:620px;margin-bottom:28px}
.t-pill{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);border-radius:30px;padding:7px 14px;
  font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;text-decoration:none;color:var(--white)}
.t-pill:hover{background:rgba(245,197,24,0.2);border-color:var(--gold);color:var(--gold);transform:translateY(-2px)}
.t-pill img{width:22px;height:15px;border-radius:2px;object-fit:cover}
.pill-pct{font-size:10px;font-weight:700;background:rgba(245,197,24,0.25);color:var(--gold);border-radius:10px;padding:1px 7px}
.cv-cta{display:inline-block;background:linear-gradient(135deg,var(--gold-dark),var(--gold));
  color:#1a0a2e;font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:3px;
  border:none;border-radius:50px;padding:14px 48px;cursor:pointer;
  box-shadow:0 8px 30px rgba(245,197,24,0.4);transition:all .2s}
.cv-cta:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(245,197,24,0.5)}

/* NAV */
#album{display:none}
.al-nav{position:sticky;top:0;z-index:100;
  background:linear-gradient(90deg,#3A0D5C,#5B1A8A);
  border-bottom:3px solid var(--gold);padding:0 16px;display:flex;align-items:center;
  box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.nav-back{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
  color:var(--gold);cursor:pointer;padding:12px 0;margin-right:16px;white-space:nowrap;
  border:none;background:none;font-family:'Barlow Condensed',sans-serif;transition:color .2s;flex-shrink:0}
.nav-back:hover{color:white}
.nav-logos{display:flex;align-items:center;gap:10px;margin-left:auto;padding:8px 0;flex-shrink:0}
.nav-div{width:1px;height:24px;background:rgba(255,255,255,0.2);margin:0 8px}
.nav-tabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;flex:1;padding:4px 0}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{display:flex;align-items:center;gap:5px;padding:10px 12px;font-size:11px;font-weight:700;
  letter-spacing:.5px;text-transform:uppercase;color:rgba(255,255,255,0.55);cursor:pointer;
  border:none;background:none;border-bottom:3px solid transparent;white-space:nowrap;
  transition:all .15s;font-family:'Barlow Condensed',sans-serif;margin-bottom:-3px}
.nav-tab img{width:20px;height:14px;border-radius:2px;object-fit:cover}
.nav-tab:hover{color:rgba(255,255,255,0.85)}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.nav-tab.has-s .tdot{background:var(--gold)}
.tdot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.2);flex-shrink:0}

/* TEAM PAGE */
.tp{display:none;min-height:calc(100vh - 52px);background:var(--page-bg)}
.tp.active{display:block}

/* Hero */
.t-hero{position:relative;overflow:hidden;background:var(--purple-dark)}
.t-strip{padding:28px 36px 24px;position:relative;overflow:hidden;display:flex;align-items:center;gap:24px}
.t-strip-pat{position:absolute;inset:0;
  background-image:repeating-linear-gradient(60deg,rgba(255,255,255,0.04) 0,rgba(255,255,255,0.04) 1px,transparent 0,transparent 28px)}
.t-ball{position:absolute;right:-30px;bottom:-30px;font-size:130px;opacity:0.06;z-index:0;line-height:1}
.t-crest{position:relative;z-index:1;width:90px;height:90px;flex-shrink:0;border-radius:50%;
  border:4px solid rgba(255,255,255,0.3);background:rgba(0,0,0,0.25);overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.t-crest img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block}
.t-info{position:relative;z-index:1;flex:1}
.t-eyebrow{font-size:9px;font-weight:700;letter-spacing:5px;text-transform:uppercase;
  color:rgba(255,255,255,0.55);margin-bottom:3px;font-family:'Barlow Condensed',sans-serif}
.t-name{font-family:'Bebas Neue',cursive;font-size:clamp(40px,6vw,68px);line-height:.9;letter-spacing:3px;color:white}
.t-sup{margin-top:7px;font-size:12px;color:rgba(255,255,255,0.65);font-family:'Barlow Condensed',sans-serif}
.t-sup strong{color:var(--gold);font-weight:700}
.tpb{margin-top:10px;max-width:260px}
.tpb-lbl{display:flex;justify-content:space-between;font-size:10px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:5px;font-family:'Barlow Condensed',sans-serif}
.tpb-g{color:var(--gold)}
.tpb-bar{height:6px;background:rgba(0,0,0,0.3);border-radius:3px;overflow:hidden}
.tpb-fill{height:100%;background:linear-gradient(90deg,#D4A00E,var(--gold));border-radius:3px;transition:width .5s ease}
.t-bbar{background:rgba(0,0,0,0.25);border-top:1px solid rgba(255,255,255,0.1);
  padding:9px 36px;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}
.t-bbar-lbl{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.38)}

/* PRIZES */
.prizes{background:linear-gradient(135deg,#0f0520,#1a0a2e);border-bottom:3px solid var(--gold)}
.prizes-grid{display:grid;grid-template-columns:repeat(4,1fr)}
.pz{padding:16px;border-right:1px solid rgba(255,255,255,0.06);position:relative;overflow:hidden;transition:background .2s}
.pz:last-child{border-right:none}
.pz:hover{background:rgba(255,255,255,0.025)}
.pz::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--gold-dark),var(--gold));
  transform:scaleX(0);transform-origin:left;transition:transform .3s}
.pz:hover::before{transform:scaleX(1)}
.pz-ico{width:28px;height:28px;border-radius:6px;background:rgba(245,197,24,0.1);
  border:1px solid rgba(245,197,24,0.2);display:flex;align-items:center;justify-content:center;margin-bottom:9px}
.pz-svg{width:14px;height:14px;stroke:var(--gold);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.pz-role{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.36);
  font-family:'Barlow Condensed',sans-serif;margin-bottom:3px}
.pz-val{font-family:'Bebas Neue',cursive;font-size:19px;color:var(--gold);letter-spacing:1px;line-height:1}
.pz-det{font-size:9px;color:rgba(255,255,255,0.3);margin-top:4px;font-family:'Barlow Condensed',sans-serif;
  letter-spacing:.3px;line-height:1.4}
.pz-tag{display:inline-block;font-size:7px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  background:rgba(245,197,24,0.1);color:rgba(245,197,24,0.65);border-radius:3px;
  padding:2px 6px;margin-top:5px;font-family:'Barlow Condensed',sans-serif}

/* STATUS BAR */
.sbar{background:rgba(0,0,0,0.45);border-bottom:1px solid rgba(245,197,24,0.12);
  padding:7px 36px;display:flex;align-items:center;gap:12px;
  font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1px;text-transform:uppercase}
.sdot{width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px #22c55e;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.stxt{color:rgba(255,255,255,0.55)}
.srefresh{margin-left:auto;cursor:pointer;color:rgba(245,197,24,.55);
  display:flex;align-items:center;gap:5px;transition:color .2s;border:none;background:none;
  font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1px;text-transform:uppercase}
.srefresh:hover{color:var(--gold)}

/* PAGE HEADER */
.ph{background:white;border-bottom:2px solid var(--page-line);padding:14px 36px;
  display:flex;align-items:center;gap:12px}
.ph img.fl{width:30px;height:21px;border-radius:3px;object-fit:cover}
.ph-title{font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:2px;color:var(--purple-dark)}
.ph-sub{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;color:rgba(0,0,0,0.36);margin-left:auto}
.ph-count{font-family:'Bebas Neue',cursive;font-size:15px;color:rgba(0,0,0,0.2)}

/* ALBUM GRID — 8 x 2 rows  */
.ag-wrap{background:var(--page-bg);padding:24px 32px 44px;position:relative}
.ag-wrap::before{content:'';position:absolute;left:0;right:0;top:0;bottom:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 31px,rgba(0,0,0,0.035) 32px);
  pointer-events:none}
.ag{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  gap:12px;
  position:relative;z-index:1;
}

/* STICKER CARD — Panini style, compact */
.sc{position:relative;user-select:none;transition:transform .2s;cursor:default}
.sc:hover{transform:translateY(-4px) rotate(-0.8deg)}
.sc:hover .sc-in{box-shadow:0 10px 28px rgba(0,0,0,0.22)}
.sc-in{background:white;border-radius:5px;overflow:hidden;
  box-shadow:var(--card-shadow);border:1px solid rgba(0,0,0,0.07);transition:box-shadow .2s}

/* top colour strip */
.sc-bar{height:24px;display:flex;align-items:center;justify-content:space-between;padding:0 6px}
.sc-num{font-family:'Bebas Neue',cursive;font-size:13px;color:white;letter-spacing:.5px}
.sc-ico{font-size:11px}

/* image area */
.sc-img-wrap{width:100%;aspect-ratio:3/4;position:relative;overflow:hidden;
  background:rgba(91,26,138,0.07);display:flex;align-items:center;justify-content:center}
.sc-img{width:100%;height:100%;object-fit:cover;display:block;transition:filter .3s}
.sc:not(.earned) .sc-img{filter:grayscale(1) brightness(.35)}
.sc-ph{display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;width:100%;height:100%;opacity:.28}
.sc-ph-ico{font-size:22px}
.sc-ph-id{font-size:7px;font-family:monospace;color:#444;text-align:center;padding:0 3px;line-height:1.2}

/* label */
.sc-lbl-wrap{padding:5px 6px 6px;border-top:2px solid}
.sc-lbl{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;
  color:#1a1a2e;line-height:1.2;letter-spacing:.2px}
.sc:not(.earned) .sc-lbl{color:rgba(0,0,0,0.28)}

/* earned glow */
.sc.earned .sc-in{box-shadow:0 4px 14px rgba(91,26,138,0.3),0 0 0 2px var(--purple)}
.sc.earned .sc-in::after{content:'';position:absolute;top:-40%;left:-60%;width:35%;height:200%;
  background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.22),transparent 60%);
  transform:rotate(15deg);animation:shine .7s ease .05s both;pointer-events:none;z-index:10}
@keyframes shine{from{left:-60%;opacity:0}20%{opacity:1}to{left:130%;opacity:0}}
.sc-star{position:absolute;top:-4px;right:-4px;z-index:5;width:18px;height:18px;
  background:var(--gold);border-radius:50%;border:2px solid white;
  display:flex;align-items:center;justify-content:center;font-size:8px;
  opacity:0;transform:scale(.3);transition:all .25s cubic-bezier(.34,1.56,.64,1)}
.sc.earned .sc-star{opacity:1;transform:scale(1)}
.sc:not(.earned) .sc-in{box-shadow:inset 0 0 0 2px rgba(0,0,0,0.05),var(--card-shadow)}

/* PAGE FOOTER */
.pf{background:linear-gradient(135deg,var(--purple-dark),var(--purple));
  padding:12px 36px;display:flex;align-items:center;justify-content:space-between;border-top:3px solid var(--gold)}
.pf-copy{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;
  text-transform:uppercase;color:rgba(255,255,255,0.3)}

/* RESPONSIVE */
@media(max-width:900px){
  .ag{grid-template-columns:repeat(4,1fr)}
}
@media(max-width:560px){
  .prizes-grid{grid-template-columns:repeat(2,1fr)}
  .pz{border-bottom:1px solid rgba(255,255,255,0.05)}
  .t-strip{padding:18px;gap:14px;flex-wrap:wrap}
  .t-crest{width:70px;height:70px}
  .ag-wrap{padding:16px 14px 36px}
  .ag{grid-template-columns:repeat(4,1fr);gap:8px}
  .ph,.t-bbar,.pf{padding:10px 14px}
  .sbar{padding:6px 14px}
}
</style>
</head>
<body>

<!-- COVER -->
<div id="cover">
  <div class="cvbg"></div>
  <div class="hex"></div><div class="hex"></div><div class="hex"></div>
  <div class="hex"></div><div class="hex"></div><div class="hex"></div>
  <div class="cv-inner">
    <div class="cv-book">
      <div class="bk-spine"></div>
      <div class="bk-cover">

        <svg class="bk-geo" viewBox="0 0 280 420" xmlns="http://www.w3.org/2000/svg">
          <circle cx="0"   cy="80"  r="62" fill="#1a3f8a" opacity=".85"/>
          <circle cx="68"  cy="118" r="54" fill="#1a3f8a" opacity=".7"/>
          <circle cx="0"   cy="200" r="60" fill="#1a3f8a" opacity=".75"/>
          <circle cx="58"  cy="268" r="50" fill="#1a3f8a" opacity=".6"/>
          <circle cx="0"   cy="360" r="58" fill="#1a3f8a" opacity=".65"/>
          <circle cx="280" cy="80"  r="62" fill="#1a3f8a" opacity=".85"/>
          <circle cx="212" cy="128" r="54" fill="#1a3f8a" opacity=".7"/>
          <circle cx="280" cy="210" r="60" fill="#1a3f8a" opacity=".75"/>
          <circle cx="222" cy="268" r="50" fill="#1a3f8a" opacity=".6"/>
          <circle cx="280" cy="360" r="58" fill="#1a3f8a" opacity=".65"/>
          <circle cx="140" cy="390" r="56" fill="#1a3f8a" opacity=".6"/>
          <circle cx="0"   cy="55"  r="46" fill="#c8783a" opacity=".9"/>
          <circle cx="280" cy="45"  r="42" fill="#c8783a" opacity=".8"/>
          <circle cx="0"   cy="345" r="50" fill="#c8783a" opacity=".85"/>
          <circle cx="280" cy="335" r="46" fill="#c8783a" opacity=".75"/>
          <circle cx="75"  cy="410" r="44" fill="#c8783a" opacity=".65"/>
          <circle cx="210" cy="415" r="42" fill="#c8783a" opacity=".6"/>
        </svg>

        <div class="bk-top-strip">ALBUM DE CAMPANHA</div>

        <div class="bk-logo-b">
          <svg viewBox="0 0 200 230" xmlns="http://www.w3.org/2000/svg">
            <path d="M28,18 L28,208 L122,208 C164,208 190,185 190,153
                     C190,130 176,113 154,106
                     C171,98 182,83 182,59
                     C182,32 161,18 122,18 Z
                     M74,62 L114,62 C131,62 142,71 142,86
                     C142,101 131,111 114,111 L74,111 Z
                     M74,165 L74,124 L120,124
                     C139,124 150,134 150,151

<script>
const REPO = './assets';

const FLAG_CODES = {
  mexico:'mx',canada:'ca',belgica:'be',alemanha:'de',
  holanda:'nl',uruguai:'uy',espanha:'es',franca:'fr',
  japao:'jp',portugal:'pt',inglaterra:'gb-eng'
};
const flagUrl = id => `https://flagcdn.com/w40/${FLAG_CODES[id]}.png`;

const TEAMS = [
  {id:'mexico',     name:'México',     color:'#006847', supervisor:'Narcelio Ramos Souza'},
  {id:'canada',     name:'Canadá',     color:'#D52B1E', supervisor:'Rodrigo Almeida da Costa'},
  {id:'belgica',    name:'Bélgica',    color:'#EF3340', supervisor:'Thayla Ramalho Silva Machado'},
  {id:'alemanha',   name:'Alemanha',   color:'#333333', supervisor:'Dilcineia Batista'},
  {id:'holanda',    name:'Holanda',    color:'#AE1C28', supervisor:'Gilnei Freitas de Castro'},
  {id:'uruguai',    name:'Uruguai',    color:'#5B9FD4', supervisor:'Gisele Muniz Silvestre'},
  {id:'espanha',    name:'Espanha',    color:'#AA151B', supervisor:'Raiane Leal Percu'},
  {id:'franca',     name:'França',     color:'#002395', supervisor:'Ronald Henrique de Oliveira Malta'},
  {id:'japao',      name:'Japão',      color:'#BC002D', supervisor:'Edson Louzada dos Anjos Junior'},
  {id:'portugal',   name:'Portugal',   color:'#006600', supervisor:'Pedro Guilherme Crispim dos Anjos'},
  {id:'inglaterra', name:'Inglaterra', color:'#CF1020', supervisor:'Debora Juliana Ferreira da Silva'},
];

// 16 stickers — 8 × 2 grid
const STICKERS = [
  {id:'efetividade_90',     label:'90% de Efetividade',               num:'01', icon:'✅'},
  {id:'pe_50pct_prom',      label:'50% Promotores c/ Ponto Extra',    num:'02', icon:'📦'},
  {id:'pe_100pct_prom',     label:'100% Promotores c/ Ponto Extra',   num:'03', icon:'🎯'},
  {id:'cross_50pct',        label:'50% Lojas com Cross',              num:'04', icon:'✖'},
  {id:'terminal_20pct',     label:'20% Lojas com Terminal',           num:'05', icon:'🖥'},
  {id:'ilha_20pct',         label:'20% Lojas com Ilha',               num:'06', icon:'🏝'},
  {id:'display_turbilhao',  label:'2 Lojas c/ Display ou Turbilhão', num:'07', icon:'🛒'},
  {id:'criativo_copa_2',    label:'2 Lojas PE Criativo Copa',         num:'08', icon:'⚽'},
  {id:'criativo_copa_4',    label:'4 Lojas PE Criativo Copa',         num:'09', icon:'⚽'},
  {id:'criativo_sj_2',      label:'2 Lojas PE Criativo São João',     num:'10', icon:'🎆'},
  {id:'criativo_sj_4',      label:'4 Lojas PE Criativo São João',     num:'11', icon:'🎆'},
  {id:'mpdv_leve_25',       label:'25% Lojas com MPDV Leve',          num:'12', icon:'📋'},
  {id:'mpdv_leve_50',       label:'50% Lojas com MPDV Leve',          num:'13', icon:'📋'},
  {id:'mpdv_pesado_1',      label:'1 Loja com MPDV Pesado',           num:'14', icon:'🏋'},
  {id:'mpdv_pesado_2',      label:'2 Lojas com MPDV Pesado',          num:'15', icon:'🏋'},
  {id:'autofalante',        label:'Anúncio no Autofalante',           num:'16', icon:'📢'},
];

let DADOS = {};
let imgTs = Date.now();
let ultimaAtualizacao = null;

async function carregarDados() {
  if (location.protocol === 'file:') {
    console.warn('Abra via servidor para carregar dados.json');
    DADOS = { equipes: {} };
    atualizarStatusBar('Abra pelo GitHub Pages para ver as figurinhas');
    return;
  }
  try {
    const r = await fetch('dados.json?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    DADOS = await r.json();
    ultimaAtualizacao = new Date();
    const hora = ultimaAtualizacao.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
    atualizarStatusBar('Atualizado às ' + hora);
  } catch(e) {
    console.warn('dados.json não encontrado:', e.message);
    DADOS = { equipes: {} };
    atualizarStatusBar('dados.json não encontrado');
  }
}

function atualizarStatusBar(msg) {
  document.querySelectorAll('.stxt').forEach(el => el.textContent = msg);
}

const isEarned = (tid, sid) => !!(DADOS.equipes?.[tid]?.[sid]);

function teamProg(tid) {
  const e = STICKERS.filter(s => isEarned(tid, s.id)).length;
  return { earned:e, total:STICKERS.length, pct: Math.round(e/STICKERS.length*100) };
}
function globalProg() {
  let e=0, t=TEAMS.length*STICKERS.length;
  TEAMS.forEach(tm => STICKERS.forEach(s => { if(isEarned(tm.id,s.id)) e++; }));
  return { earned:e, total:t, pct: t ? Math.round(e/t*100) : 0 };
}
function darken(hex,amt=45) {
  let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.max(0,r-amt)},${Math.max(0,g-amt)},${Math.max(0,b-amt)})`;
}

function buildAll() {
  buildCoverPills();
  buildNavTabs();
  buildPages();
  refreshUI();
}

function buildCoverPills() {
  document.getElementById('cv-teams').innerHTML = TEAMS.map(t => `
    <a class="t-pill" href="#" onclick="openAlbum('${t.id}');return false">
      <img src="${flagUrl(t.id)}" alt="${t.name}" width="22" height="15">
      ${t.name}
      <span class="pill-pct" id="pill-${t.id}">0%</span>
    </a>`).join('');
}

function buildNavTabs() {
  document.getElementById('nav-tabs').innerHTML = TEAMS.map(t => `
    <button class="nav-tab" id="tab-${t.id}" onclick="switchTeam('${t.id}')">
      <img src="${flagUrl(t.id)}" alt="${t.name}" width="20" height="14">
      ${t.name}<span class="tdot"></span>
    </button>`).join('');
}

function buildPages() {
  document.getElementById('team-pages').innerHTML = TEAMS.map(t => buildPage(t)).join('');
}

function buildPage(t) {
  const {earned,total,pct} = teamProg(t.id);

  const cards = STICKERS.map(s => {
    const e = isEarned(t.id, s.id);
    return `<div class="sc${e?' earned':''}" id="sc-${t.id}-${s.id}">
      <div class="sc-star">★</div>
      <div class="sc-in">
        <div class="sc-bar" style="background:${t.color}">
          <span class="sc-num">${s.num}</span>
          <span class="sc-ico">${s.icon}</span>
        </div>
        <div class="sc-img-wrap">
          <img class="sc-img" id="img-${t.id}-${s.id}" src="${REPO}/stickers/${t.id}/${s.id}.png?t=${imgTs}" alt="${s.label}"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex';this.onerror=null;">
          <div class="sc-ph">
            <div class="sc-ph-ico">${s.icon}</div>
            <div class="sc-ph-id">${t.id}/${s.id}.png</div>
          </div>
        </div>
        <div class="sc-lbl-wrap" style="border-top-color:${t.color}">
          <div class="sc-lbl">${s.label}</div>
        </div>
      </div>
    </div>`;
  }).join('');

  return `<div class="tp" id="page-${t.id}">
    <div class="t-hero">
      <div class="t-strip" style="background:linear-gradient(135deg,${t.color} 0%,${darken(t.color)} 100%)">
        <div class="t-strip-pat"></div>
        <div class="t-ball">⚽</div>
        <div class="t-crest">
          <img src="${flagUrl(t.id)}" alt="${t.name}" onerror="this.style.display='none'">
        </div>
        <div class="t-info">
          <div class="t-eyebrow">Seleção · Copa Bracell Absoluto 2026</div>
          <div class="t-name">${t.name}</div>
          <div class="t-sup">Supervisor: <strong>${t.supervisor}</strong></div>
          <div class="tpb">
            <div class="tpb-lbl">
              <span>Figurinhas: <span id="cnt-${t.id}">${earned}</span>/${total}</span>
              <span class="tpb-g" id="pct-${t.id}">${pct}%</span>
            </div>
            <div class="tpb-bar"><div class="tpb-fill" id="fill-${t.id}" style="width:${pct}%"></div></div>
          </div>
        </div>
      </div>
      <div class="t-bbar">

function refreshUI() {
  const gp = globalProg();
  const bar = document.getElementById('cv-bar');
  const pct = document.getElementById('cv-pct');
  if(bar) bar.style.width = gp.pct + '%';
  if(pct) pct.textContent = gp.pct + '%';
  TEAMS.forEach(t => {
    const {earned,pct} = teamProg(t.id);
    const pill = document.getElementById('pill-'+t.id); if(pill) pill.textContent = pct+'%';
    const tab = document.getElementById('tab-'+t.id); if(tab) tab.classList.toggle('has-s', earned>0);
    const fill = document.getElementById('fill-'+t.id); if(fill) fill.style.width = pct+'%';
    const pctEl = document.getElementById('pct-'+t.id); if(pctEl) pctEl.textContent = pct+'%';
    const cnt = document.getElementById('cnt-'+t.id); if(cnt) cnt.textContent = earned;
    STICKERS.forEach(s => {
      const card = document.getElementById(`sc-${t.id}-${s.id}`);
      if(card) card.classList.toggle('earned', isEarned(t.id, s.id));
    });
  });
}

async function recarregar() {
  await carregarDados();
  // Novo timestamp força o navegador a recarregar todos os PNGs do disco
  imgTs = Date.now();
  TEAMS.forEach(t => {
    STICKERS.forEach(s => {
      const img = document.getElementById(`img-${t.id}-${s.id}`);
      if (img) {
        // Mostra a imagem novamente (caso tenha sumido por erro anterior)
        img.style.display = '';
        img.nextElementSibling.style.display = 'none';
        img.src = `${REPO}/stickers/${t.id}/${s.id}.png?t=${imgTs}`;
      }
    });
  });
  refreshUI();
}

let currentTeam = null;
function openAlbum(teamId) {
  document.getElementById('cover').style.display = 'none';
  document.getElementById('album').style.display = 'block';
  switchTeam(teamId || TEAMS[0].id);
}
function goToCover() {
  document.getElementById('cover').style.display = 'flex';
  document.getElementById('album').style.display = 'none';
  currentTeam = null;
}
function switchTeam(tid) {
  document.querySelectorAll('.tp').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  const page = document.getElementById('page-'+tid); if(page) page.classList.add('active');
  const tab = document.getElementById('tab-'+tid);
  if(tab) { tab.classList.add('active'); tab.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}); }
  currentTeam = tid;
  window.scrollTo(0,0);
}

(async function() { await carregarDados(); buildAll(); })();
